# Test YAML file to demonstrate DDD validation rules
# This file contains intentional violations to test validation

model:
  name: "TestModel"
  basePackage: "com.example.test"

boundedContexts:
  - name: "TestContext"
    package: "test"

    # Value Objects with violations
    valueObjects:
      - name: "InvalidValueObject"
        description: "This VO has identity field (violation)"
        fields:
          - name: "id"          # VIOLATION: Value objects should not have ID
            type: "UUID"
            final: true
          - name: "value"
            type: "String"
            final: false        # VIOLATION: VO fields must be final

      - name: "MutableValueObject"
        description: "This VO is mutable (violation)"
        fields:
          - name: "amount"
            type: "BigDecimal"
            final: false        # VIOLATION: VO fields must be final
        methods:
          - name: "setAmount"   # VIOLATION: VO should not have setters
            returnType: "void"
            parameters:
              - name: "amount"
                type: "BigDecimal"

    # Aggregates with violations
    aggregates:
      - name: "InvalidAggregate"
        description: "Aggregate with violations"

        # Root entity without proper identity
        root:
          name: "InvalidRoot"
          isAggregateRoot: false  # VIOLATION: Root should be marked as aggregate root
          # Missing identityField    # VIOLATION: Entity must have identity
          fields:
            - name: "name"
              type: "String"
              final: false
          methods:
            - name: "equals"      # VIOLATION: Should only compare identity
              returnType: "boolean"
              parameters:
                - name: "other"
                  type: "Object"

        # Internal entities with violations
        entities:
          - name: "InternalEntity"
            isAggregateRoot: true # VIOLATION: Only root should be aggregate root
            identityField:
              name: "id"
              type: "UUID"
            fields:
              - name: "externalRef"
                type: "Customer"  # VIOLATION: Should reference by ID only
                final: true

    # Domain Events with violations
    domainEvents:
      - name: "CreateOrderEvent"  # VIOLATION: Should be past tense (OrderCreatedEvent)
        description: "Event with present tense name"
        fields:
          - name: "orderId"
            type: "UUID"
            final: false          # VIOLATION: Event fields must be final
          # Missing occurredOn      # TODO: Add rule to check for timestamp

    # Repositories with violations
    repositories:
      - name: "ValueObjectRepository"  # VIOLATION: Repository for value object
        aggregateType: "InvalidValueObject"
        idType: "UUID"

      - name: "InternalEntityRepository"  # VIOLATION: Repository for internal entity
        aggregateType: "InternalEntity"
        idType: "UUID"

    # Application Services with potential violations
    applicationServices:
      - name: "BusinessLogicService"
        description: "Service with business logic (violation)"
        useCases:
          - name: "calculateOrderTotal"  # VIOLATION: Calculation logic in app service
            description: "Calculates order total"
            transactional: true
            input:
              name: "CalculateCommand"
              fields:
                - name: "orderId"
                  type: "String"
            output:
              name: "TotalResult"
              fields:
                - name: "total"
                  type: "BigDecimal"
