spring.application.name=ddsl

# OpenRouter Configuration (OpenAI-compatible API)
# Get API key from: https://openrouter.ai/keys
spring.ai.openai.api-key=${OPENROUTER_API_KEY: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}
# OpenRouter base URLs for Chat and Embeddings
spring.ai.openai.chat.base-url=https://openrouter.ai/api/v1
spring.ai.openai.embedding.base-url=https://openrouter.ai/api/v1
#spring.ai.openai.base-url=https://openrouter.ai/api/v1

# Chat Model: GPT-4o-mini (fast, cost-effective)
spring.ai.openai.chat.options.model=openai/gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.1
spring.ai.openai.chat.options.top-p=0.95
spring.ai.openai.chat.options.max-tokens=2500

# Embedding Model: text-embedding-3-small (1536 dimensions)
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.openai.embedding.options.dimensions=1536

# OpenRouter-specific headers for Chat
spring.ai.openai.chat.options.http-headers[0].name=HTTP-Referer
spring.ai.openai.chat.options.http-headers[0].value=https://ddsl.dev
spring.ai.openai.chat.options.http-headers[1].name=X-Title
spring.ai.openai.chat.options.http-headers[1].value=DDSL AI Agent

# Qdrant Vector Store
# NOTE: Uses new collection 'ddsl-knowledge-base-v3' for 1536-dim embeddings
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.collection-name=ddsl-knowledge-base-v3
spring.ai.vectorstore.qdrant.initialize-schema=true

# MCP Server (WebMVC transport)
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=ddsl-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages

# Agent Pipeline Configuration
ddsl.agent.max-retries=3
ddsl.agent.retriever.top-k=4
ddsl.agent.retriever.similarity-threshold=0.75
