spring.application.name=ddsl

#Google Gemini (Spring AI)
spring.ai.google.genai.api-key=${GOOGLE_AI_API_KEY:burh-lmao}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.2

#Google Gemini Embedding
spring.ai.google.genai.embedding.api-key=${GOOGLE_AI_API_KEY:bruh-lmao}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001


#Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.collection-name=ddsl-knowledge-base-v2
spring.ai.vectorstore.qdrant.initialize-schema=true

#MCP Server (WebMVC transport)
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=ddsl-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages