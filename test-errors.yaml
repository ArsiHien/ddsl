# Test file with actual errors that should block code generation
model:
  name: "ErrorTestModel"
  basePackage: "com.example.errortest"

boundedContexts:
  - name: "ErrorTestContext"
    package: "errortest"

    # Value Object with ERROR-level violations
    valueObjects:
      - name: "BadValueObject"
        description: "Value object with identity field (ERROR)"
        fields:
          - name: "id"           # ERROR: Value objects should not have ID fields
            type: "UUID"
            final: true
          - name: "value"
            type: "String"
            final: false        # ERROR: VO fields must be final

    # Aggregate with ERROR-level violations
    aggregates:
      - name: "BadAggregate"
        description: "Aggregate with violations"

        root:
          name: "BadRoot"
          isAggregateRoot: false  # ERROR: Root should be marked as aggregate root
          # Missing identityField    # ERROR: Entity must have identity
          fields:
            - name: "name"
              type: "String"
              final: false

    # Repository for value object (ERROR)
    repositories:
      - name: "BadValueObjectRepository"  # ERROR: Repository for value object
        aggregateType: "BadValueObject"
        idType: "UUID"
