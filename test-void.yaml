model:
  name: "TestSystem"
  basePackage: "com.example.test"

boundedContexts:
  - name: "TestContext"
    package: "test"

    applicationServices:
      - name: "TestService"
        useCases:
          - name: "testUseCase"
            transactional: true
            input:
              name: "TestCommand"
              fields:
                - name: "id"
                  type: "String"
            output:
              type: "void"
            steps:
              - type: "EXECUTE"
                code: "doSomething();"
